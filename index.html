<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ Personal - Cloud OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --bg-color: #050508;
            --panel-color: #111118;
            --accent-color: #8a2be2;
            --text-color: #f0f0f5;
            --text-dim: #707085;
            --electro-purple: #b040ff;
        }

        body {
            font-family: 'Courier Prime', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        /* CEAS LIVE */
        .time-widget {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(17, 17, 24, 0.75);
            border: 1px solid rgba(138, 43, 226, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            text-align: right;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-family: 'Orbitron', sans-serif;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .widget-time {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(138, 43, 226, 0.8);
            letter-spacing: 1px;
        }
        .widget-date {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        body.menu-collapsed .time-widget {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-20px);
        }

        /* BUTON TOGGLE MENIU */
        .toggle-menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 101;
            background: var(--panel-color);
            border: 1px solid rgba(138, 43, 226, 0.4);
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-family: 'Courier Prime', monospace;
        }
        .toggle-menu-btn:hover {
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
        }

        /* ECRAN LOGIN */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .login-box {
            background-color: var(--panel-color);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            border: 1px solid #1a1a26;
            width: 80%;
            max-width: 320px;
        }
        
        .login-lang-wrapper {
            margin-bottom: 20px;
            text-align: right;
        }

        input[type="password"], input[type="number"], input[type="text"] {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #2a2a3a;
            background: #09090d;
            color: white;
            font-size: 14px;
            outline: none;
            font-family: 'Courier Prime', monospace;
        }
        input[type="password"] { width: 90%; margin: 15px 0; text-align: center; }
        
        .credit-input {
            width: 140px;
            margin: 10px;
            text-align: center;
        }

        #hq-interface {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background-color: var(--panel-color);
            border-right: 1px solid #1a1a26;
            display: flex;
            flex-direction: column;
            padding: 80px 0 20px 0;
            transition: transform 0.3s ease;
        }
        
        .sidebar.collapsed {
            transform: translateX(-250px);
            position: absolute;
            height: 100vh;
            z-index: 99;
        }

        .lang-container {
            padding: 0 20px 20px 20px;
            border-bottom: 1px solid #1a1a26;
            margin-bottom: 15px;
        }

        .lang-select {
            width: 100%;
            background: #09090d;
            color: var(--text-color);
            border: 1px solid rgba(138, 43, 226, 0.5);
            padding: 8px;
            border-radius: 6px;
            font-family: 'Courier Prime', monospace;
            cursor: pointer;
            outline: none;
            font-size: 13px;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            margin-top: 60px;
            overflow-y: auto;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .sidebar.collapsed + .main-content {
            margin-left: 0;
            padding-top: 40px;
        }

        .page { display: none; height: 100%; }
        .page.active { display: block; }

        @media (max-width: 768px) {
            #hq-interface { flex-direction: column; }
            body { flex-direction: column; }
            .sidebar { 
                position: fixed; 
                top: 0; left: 0; 
                width: 100%; height: auto; 
                border-right: none; 
                border-bottom: 1px solid #1a1a26; 
                padding: 70px 0 10px 0; 
                z-index: 99;
            }
            .sidebar.collapsed { transform: translateY(-100%); }
            .main-content { padding: 20px; margin-top: 80px; }
            .sidebar.collapsed + .main-content { margin-top: 60px; }
        }

        .sidebar-header {
            padding: 0 20px 10px 20px;
            font-size: 18px;
            font-weight: bold;
            color: var(--accent-color);
        }
        .menu-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            text-align: left;
            padding: 15px 20px;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            font-family: 'Courier Prime', monospace;
        }
        .menu-btn.active {
            background-color: #09090d;
            color: var(--text-color);
            border-left: 4px solid var(--accent-color);
        }

        .card { background-color: var(--panel-color); padding: 24px; border-radius: 10px; border: 1px solid #1a1a26; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; background-color: #09090d; color: white; border: 1px solid #2a2a3a; border-radius: 8px; padding: 15px; box-sizing: border-box; font-size: 16px; font-family: 'Courier Prime', monospace; resize: vertical; }
        
        /* SKILL TREE CONFIGS */
        .genshin-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 180px);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(138, 43, 226, 0.4);
            background: #06030d;
            transition: all 0.4s ease;
        }

        .genshin-container.fullscreen-tree {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            border: none;
            border-radius: 0;
            z-index: 300;
        }

        .tree-back-btn {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 10;
            background: rgba(15, 10, 25, 0.85);
            border: 1px solid rgba(138, 43, 226, 0.5);
            color: white;
            width: 42px; height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .tree-back-btn:hover {
            background: var(--accent-color);
            box-shadow: 0 0 12px var(--accent-color);
            transform: scale(1.05);
        }

        .skill-details-panel {
            position: absolute;
            top: 0; right: -360px;
            width: 340px; height: 100%;
            background: rgba(10, 6, 18, 0.92);
            border-left: 2px solid var(--electro-purple);
            z-index: 15;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 50px 24px;
            box-sizing: border-box;
            backdrop-filter: blur(12px);
            box-shadow: -10px 0 30px rgba(0,0,0,0.6);
            overflow-y: auto;
        }
        .skill-details-panel.open { right: 0; }
        .close-details-btn {
            position: absolute;
            top: 15px; left: 15px;
            background: none; border: none;
            color: var(--text-dim); font-size: 24px;
            cursor: pointer; transition: 0.2s;
        }
        .close-details-btn:hover { color: #fff; }

        .electro-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1c0a35 0%, #06030f 100%);
            z-index: 1;
            overflow: hidden;
        }
        .electro-clouds {
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(138, 43, 226, 0.22) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(176, 64, 255, 0.18) 0%, transparent 45%),
                radial-gradient(circle at 40% 80%, rgba(75, 0, 130, 0.25) 0%, transparent 50%);
            filter: blur(30px);
            animation: electroFlow 22s ease-in-out infinite alternate;
        }
        @keyframes electroFlow {
            0% { transform: scale(1) rotate(0deg) translate(0, 0); }
            50% { transform: scale(1.15) rotate(5deg) translate(-3%, 4%); }
            100% { transform: scale(1) rotate(-5deg) translate(3%, -2%); }
        }

        .tree-viewport {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            cursor: grab;
            overflow: hidden;
        }
        .tree-viewport:active { cursor: grabbing; }

        .tree-canvas {
            position: absolute;
            width: 1200px;
            height: 900px;
            top: 0; left: 0;
            transform-origin: 0 0;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .tree-svg-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .tree-line {
            stroke-width: 3;
            transition: stroke 0.4s ease, filter 0.4s ease;
        }
        .tree-line.locked {
            stroke: #252430;
            stroke-dasharray: 6 4;
        }
        .tree-line.unlocked {
            stroke: var(--electro-purple);
            filter: drop-shadow(0 0 6px var(--electro-purple)) drop-shadow(0 0 2px #fff);
        }

        .skill-node {
            position: absolute;
            width: 80px;
            height: 80px;
            z-index: 10;
            transform: translate(-40px, -40px);
        }
        .rhombus-outer {
            width: 100%;
            height: 100%;
            transform: rotate(45deg);
            background: rgba(15, 10, 25, 0.85);
            border: 2px solid #3c354a;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .rhombus-outer:hover {
            border-color: #d6a6ff;
            transform: rotate(45deg) scale(1.08);
            box-shadow: 0 0 15px rgba(176, 64, 255, 0.4);
        }
        
        .skill-node.unlocked .rhombus-outer {
            border-color: var(--electro-purple);
            background: radial-gradient(circle, rgba(138, 43, 226, 0.4) 0%, rgba(18, 9, 36, 0.9) 100%);
            box-shadow: 0 0 20px rgba(176, 64, 255, 0.7), inset 0 0 10px rgba(176, 64, 255, 0.5);
            animation: pulseGlow 3s ease-in-out infinite alternate;
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px rgba(176, 64, 255, 0.6); border-color: var(--electro-purple); }
            100% { box-shadow: 0 0 25px rgba(176, 64, 255, 0.9), 0 0 5px #fff; border-color:
