<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ Personal - Sistem de Operare</title>
    <style>
        :root {
            --bg-color: #050508;
            --panel-color: #111118;
            --accent-color: #8a2be2;
            --text-color: #f0f0f5;
            --text-dim: #707085;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        /* 1. ECRAN LOGIN */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .login-box {
            background-color: var(--panel-color);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            border: 1px solid #1a1a26;
            width: 80%;
            max-width: 320px;
        }
        input[type="password"] {
            padding: 12px;
            width: 90%;
            border-radius: 6px;
            border: 1px solid #2a2a3a;
            background: #09090d;
            color: white;
            font-size: 16px;
            margin: 15px 0;
            text-align: center;
            outline: none;
        }

        /* 2. ECRAN CINEMATIC (INTRO IMAGE) */
        .intro-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            z-index: 9998;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer; /* Arată că se poate da click */
        }
        .intro-bg {
            position: absolute;
            width: 100%; height: 100%;
            background: url('wp10452822.png') center center no-repeat;
            background-size: contain;
            filter: brightness(0.8);
        }
        .intro-content {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-top: auto;
            margin-bottom: 8vh;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 80%;
            max-width: 400px;
        }
        .blink-text {
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 0 10px var(--accent-color);
            animation: blink 2s infinite;
        }

        /* 3. STRUCTURA INTERFĂȚII PRINCIPALE */
        .sidebar {
            width: 250px;
            background-color: var(--panel-color);
            border-right: 1px solid #1a1a26;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }
        
        /* Ajustare pentru telefoane (Meniul jos sau ascuns, dar momentan îl lăsăm simplu flexibil) */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #1a1a26; padding: 10px 0; }
            .sidebar-header { display: none; }
            .menu-btn { padding: 10px 15px; text-align: center; font-size: 14px; }
            .main-content { padding: 20px; }
        }

        .sidebar-header {
            padding: 0 20px 20px 20px;
            font-size: 18px;
            font-weight: bold;
            color: var(--accent-color);
            border-bottom: 1px solid #1a1a26;
            margin-bottom: 20px;
        }
        .menu-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            text-align: left;
            padding: 15px 20px;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
        }
        .menu-btn.active {
            background-color: #09090d;
            color: var(--text-color);
            border-left: 4px solid var(--accent-color);
        }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background-color: var(--panel-color); padding: 24px; border-radius: 10px; border: 1px solid #1a1a26; margin-bottom: 20px; }
        
        textarea { width: 100%; height: 120px; background-color: #09090d; color: white; border: 1px solid #2a2a3a; border-radius: 8px; padding: 15px; box-sizing: border-box; font-size: 16px; }
        .journal-list { margin-top: 20px; }
        .journal-entry { background: #09090d; padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent-color); margin-bottom: 15px; }
        .entry-date { font-size: 12px; color: var(--text-dim); }
        .delete-btn { background: #ff4a4a; padding: 5px 10px; font-size: 12px; border-radius: 4px; margin-top: 10px; }

        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen" class="login-overlay">
        <div class="login-box">
            <h2>Sistem de Securitate</h2>
            <p>Introdu cheia de acces:</p>
            <input type="password" id="pass-input" placeholder="Parolă...">
            <br>
            <button onclick="login()">Deblochează</button>
            <p id="error" style="color: #ff4a4a; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="intro-screen" class="intro-overlay hidden" onclick="enterHQ()">
        <div class="intro-bg"></div>
        <div class="intro-content">
            <div class="blink-text">APASĂ ENTER / SPACE SAU ATINGE ECRANUL</div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">⚔️ HQ Personal</div>
        <button class="menu-btn" onclick="switchPage('planner', this)">📅 Planner</button>
        <button class="menu-btn" onclick="switchPage('skills', this)">🌳 Skills</button>
        <button class="menu-btn" onclick="switchPage('quests', this)">📜 Quests</button>
        <button class="menu-btn active" onclick="switchPage('journal', this)">✍️ Jurnal</button>
    </div>

    <div class="main-content">
        <div id="planner" class="page"><h1>📅 Planner</h1><div class="card"><p>Planuri viitoare.</p></div></div>
        <div id="skills" class="page"><h1>🌳 Skill Tree</h1><div class="card"><p>Abilități RPG.</p></div></div>
        <div id="quests" class="page"><h1>📜 Quest Log</h1><div class="card"><p>Misiuni active.</p></div></div>
        
        <div id="journal" class="page active">
            <h1>✍️ Jurnal Personal</h1>
            <div class="card">
                <textarea id="journal-input" placeholder="Scrie ceva..."></textarea>
                <button onclick="saveJournalEntry()">Adaugă</button>
                <div class="journal-list" id="entries-container"></div>
            </div>
        </div>
    </div>

    <script>
        const PAROLA = "SecretulMeu2026";
        let authenticated = false;

        function login() {
            if(document.getElementById("pass-input").value === PAROLA) {
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("intro-screen").classList.remove("hidden");
                authenticated = true;
                window.addEventListener('keydown', handleIntroKeys);
            } else {
                document.getElementById("error").innerText = "Acces interzis.";
            }
        }

        // Funcția de intrare (comună pentru tastatură și atingere ecran)
        function enterHQ() {
            document.getElementById("intro-screen").classList.add("hidden");
            window.removeEventListener('keydown', handleIntroKeys);
        }

        function handleIntroKeys(event) {
            if (event.key === " " || event.key === "Enter") {
                enterHQ();
            }
        }

        function switchPage(pageId, buttonClicked) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            buttonClicked.classList.add('active');
        }

        window.onload = function() { displayEntries(); };

        function saveJournalEntry() {
            const textarea = document.getElementById("journal-input");
            if (textarea.value.trim() === "") return;
            let entries = JSON.parse(localStorage.getItem("myJournalEntries")) || [];
            entries.unshift({ id: Date.now(), date: new Date().toLocaleString('ro-RO'), text: textarea.value });
            localStorage.setItem("myJournalEntries", JSON.stringify(entries));
            textarea.value = "";
            displayEntries();
        }

        function displayEntries() {
            const container = document.getElementById("entries-container");
            let entries = JSON.parse(localStorage.getItem("myJournalEntries")) || [];
            container.innerHTML = entries.length === 0 ? "<p>Jurnal gol.</p>" : "";
            entries.forEach(entry => {
                container.innerHTML += `
                    <div class="journal-entry">
                        <div class="entry-date">📅 ${entry.date}</div>
                        <div>${entry.text}</div>
                        <button class="delete-btn" onclick="deleteEntry(${entry.id})">Șterge</button>
                    </div>`;
            });
        }

        function deleteEntry(id) {
            if (confirm("Ștergi postarea?")) {
                let entries = JSON.parse(localStorage.getItem("myJournalEntries")) || [];
                localStorage.setItem("myJournalEntries", JSON.stringify(entries.filter(e => e.id !== id)));
                displayEntries();
            }
        }
    </script>
</body>
</html>
