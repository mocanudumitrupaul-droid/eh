<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ Personal - Mainframe</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Courier+Prime&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0813;
            --sidebar-bg: #0f0c1b;
            --electro-purple: #8a2be2;
            --electro-glow: #bf40ff;
            --text-main: #f0edf8;
            --text-dim: #7a7293;
            --panel-bg: rgba(20, 16, 36, 0.7);
            --border-glow: rgba(138, 43, 226, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            height: 100vh;
        }

        /* ------------------ PANOURI DE SECURITATE & INTRO ------------------ */
        .fullscreen-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .hidden { display: none !important; }

        .secure-box {
            background: var(--sidebar-bg); border: 2px solid var(--electro-purple);
            padding: 40px; border-radius: 8px; text-align: center;
            box-shadow: 0 0 30px var(--border-glow); width: 90%; max-width: 400px;
            color: var(--text-main); z-index: 10000;
        }
        .secure-box h2 { font-family: 'Orbitron', sans-serif; margin-bottom: 20px; color: #fff; }
        .matrix-input {
            width: 100%; padding: 12px; background: #000; border: 1px solid var(--text-dim);
            color: #fff; text-align: center; font-family: 'Courier Prime', monospace;
            margin-bottom: 20px; font-size: 16px; border-radius: 4px;
        }
        .custom-btn {
            background: var(--electro-purple); color: #fff; border: none;
            padding: 12px 30px; font-family: 'Orbitron', sans-serif; font-weight: bold;
            cursor: pointer; letter-spacing: 1px; border-radius: 4px; transition: 0.3s;
        }
        .custom-btn:hover { background: var(--electro-glow); box-shadow: 0 0 15px var(--electro-glow); }
        .error-msg { color: #ff4a4a; font-family: 'Courier Prime', monospace; margin-top: 15px; font-size: 14px; }

        /* INTRO SCREEN YOUTUBE */
        #intro-screen { background: #000; cursor: pointer; }
        .video-background-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.6;
        }
        .video-background-layer iframe { width: 100%; height: 100%; border: none; transform: scale(1.35); }
        .blink-text {
            position: relative; z-index: 10; font-family: 'Orbitron', sans-serif;
            font-size: 20px; color: #fff; text-shadow: 0 0 10px var(--electro-glow);
            animation: pulseBlink 2s infinite; text-align: center; padding: 20px;
        }
        @keyframes pulseBlink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* ------------------ INTERFAȚĂ CENTRALĂ HQ ------------------ */
        .genshin-container { display: flex; height: 100vh; width: 100vw; position: relative; }
        
        /* SIDEBAR LATERALE */
        .sidebar {
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid rgba(138, 43, 226, 0.2);
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px;
            transition: all 0.3s ease; z-index: 100;
        }
        .sidebar.collapsed { width: 0; padding: 20px 0; overflow: hidden; border-right: none; }
        
        .sidebar-header { font-family: 'Orbitron', sans-serif; font-size: 18px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .menu-btn {
            width: 100%; text-align: left; background: transparent; border: none; color: var(--text-dim);
            padding: 14px 15px; font-size: 15px; cursor: pointer; font-family: 'Inter', sans-serif;
            border-radius: 6px; margin-bottom: 8px; transition: 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .menu-btn:hover, .menu-btn.active { color: #fff; background: rgba(138, 43, 226, 0.15); box-shadow: inset 3px 0 0 var(--electro-purple); }
        
        .change-lang-matrix {
            background: #000; color: var(--text-dim); border: 1px solid rgba(138, 43, 226, 0.3);
            padding: 5px; width: 100%; border-radius: 4px; font-family: 'Orbitron', sans-serif; cursor: pointer;
        }

        /* FILTRUL DE PAGINI VIZUALE */
        .main-content-zone { flex: 1; position: relative; overflow: hidden; height: 100%; display: flex; flex-direction: column; }
        .top-bar {
            height: 60px; border-bottom: 1px solid rgba(138, 43, 226, 0.15);
            display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: rgba(15, 12, 27, 0.5);
        }
        .toggle-sb-trigger { background: transparent; border: none; color: #fff; font-size: 20px; cursor: pointer; }
        .clock-widget { text-align: right; font-family: 'Orbitron', sans-serif; }
        #live-time { font-size: 16px; font-weight: bold; color: var(--electro-glow); }
        #live-date { font-size: 11px; color: var(--text-dim); }

        .page { display: none; flex: 1; padding: 40px; overflow-y: auto; }
        .page.active { display: block; }
        
        /* BLOCURI DE CONȚINUT STANDARD */
        .dashboard-panel {
            background: var(--panel-bg); border: 1px solid rgba(138, 43, 226, 0.2);
            padding: 30px; border-radius: 8px; backdrop-filter: blur(10px); max-width: 800px; margin-bottom: 25px;
        }
        .dashboard-panel h1 { font-family: 'Orbitron', sans-serif; font-size: 24px; margin-bottom: 10px; }
        .subtitle-terminal { font-family: 'Courier Prime', monospace; color: var(--electro-glow); font-size: 12px; margin-bottom: 20px; letter-spacing: 2px; }

        /* TRACKER PROGRESS BAR JOC */
        .progress-container-shell { width: 100%; background: #000; height: 24px; border-radius: 12px; overflow: hidden; border: 1px solid var(--electro-purple); margin: 15px 0; position: relative; }
        .progress-fill-core { height: 100%; width: 0%; background: linear-gradient(90deg, var(--electro-purple), var(--electro-glow)); transition: width 0.4s ease; }
        .progress-text-overlay { position: absolute; width: 100%; text-align: center; top: 2px; font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: bold; color: #fff; mix-blend-mode: difference; }

        /* SISTEM DE FIȘIERE JURNAL */
        .journal-box-layout { display: flex; flex-direction: column; gap: 15px; max-width: 700px; }
        .journal-textarea { width: 100%; height: 120px; background: rgba(0,0,0,0.4); border: 1px solid rgba(138, 43, 226, 0.4); border-radius: 6px; padding: 15px; color: #fff; font-family: 'Inter', sans-serif; resize: none; }
        .journal-textarea:focus { outline: none; border-color: var(--electro-glow); }
        
        .drawer-overlay-side {
            position: fixed; top: 0; right: -450px; width: 420px; height: 100%; background: var(--sidebar-bg);
            border-left: 2px solid var(--electro-purple); z-index: 500; box-shadow: -10px 0 30px rgba(0,0,0,0.7);
            transition: right 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); padding: 30px; display: flex; flex-direction: column;
        }
        .drawer-overlay-side.open { right: 0; }
        .drawer-entries-scroll { flex: 1; overflow-y: auto; margin-top: 20px; }
        
        .journal-entry { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); padding: 15px; border-radius: 6px; margin-bottom: 15px; position: relative; }
        .entry-date { font-family: 'Courier Prime', monospace; font-size: 11px; color: var(--electro-glow); margin-bottom: 8px; }
        .delete-btn { background: rgba(255, 74, 74, 0.2); border: 1px solid #ff4a4a; color: #ff4a4a; padding: 4px 8px; font-size: 11px; cursor: pointer; border-radius: 4px; margin-top: 10px; }

        /* ------------------ REȚEAUA SKILL TREE COGNITIVĂ ------------------ */
        .fullscreen-tree { padding: 0 !important; }
        .tree-view-wrapper { width: 100%; height: 100%; position: relative; background: radial-gradient(circle at center, #141026 0%, #06050b 100%); overflow: hidden; }
        .tree-viewport-area { width: 100%; height: 100%; position: absolute; top:0; left:0; cursor: grab; }
        .tree-viewport-area:active { cursor: grabbing; }
        .tree-canvas-board { position: absolute; width: 2000px; height: 2000px; transform-origin: 0 0; pointer-events: none; }
        
        #tree-svg-canvas { position: absolute; width: 100%; height: 100%; top:0; left:0; pointer-events: none; z-index: 1; }
        .tree-line { stroke-width: 3; stroke-linecap: round; transition: all 0.5s ease; }
        .tree-line.locked { stroke: rgba(60, 50, 95, 0.4); stroke-dasharray: 6, 4; }
        .tree-line.unlocked { stroke: var(--electro-purple); filter: drop-shadow(0 0 5px var(--electro-glow)); }
        
        .nodes-layer { position: absolute; width: 100%; height: 100%; top:0; left:0; z-index: 2; }
        .skill-node { position: absolute; width: 120px; height: 120px; transform: translate(-60px, -60px); pointer-events: auto; }
        
        .rhombus-outer {
            width: 80px; height: 80px; margin: 20px auto; background: rgba(10, 8, 19, 0.85);
            border: 2px solid rgba(138, 43, 226, 0.4); transform: rotate(45deg);
            transition: all 0.3s cubic-bezier(0.2, 1, 0.2, 1); cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .rhombus-inner {
            transform: rotate(-45deg); display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: var(--text-dim); text-align: center; width: 100%; height: 100%;
        }
        .node-icon { font-size: 22px; margin-bottom: 2px; transition: transform 0.3s; }
        .rhombus-inner span:nth-child(2) { font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: bold; letter-spacing: 0.5px; color: #fff; text-transform: uppercase; }
        .node-status-text { font-size: 7px; font-family: 'Courier Prime', monospace; color: var(--text-dim); margin-top: 2px; letter-spacing: 1px; }

        /* NODE STATES CSS */
        .skill-node.unlocked .rhombus-outer { border-color: var(--electro-glow); box-shadow: 0 0 20px rgba(138, 43, 226, 0.6); background: rgba(30, 15, 60, 0.9); }
        .skill-node.unlocked .node-icon { filter: drop-shadow(0 0 6px var(--electro-glow)); }
        .skill-node.unlocked .node-status-text { color: var(--electro-glow); font-weight: bold; }
        .skill-node .rhombus-outer:hover { transform: rotate(45deg) scale(1.12); border-color: #fff; box-shadow: 0 0 25px rgba(255,255,255,0.4); }

        /* SKILL CONSOLE PANOU DREAPTA */
        .skill-details-side {
            position: absolute; top: 20px; right: -360px; width: 330px; bottom: 20px;
            background: rgba(10, 7, 20, 0.92); border: 1px solid rgba(138, 43, 226, 0.4);
            border-radius: 8px; z-index: 10; box-shadow: -5px 5px 25px rgba(0,0,0,0.8);
            transition: right 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); padding: 25px; backdrop-filter: blur(15px); pointer-events: auto;
        }
        .skill-details-side.open { right: 20px; }
        .close-details-btn { position: absolute;
