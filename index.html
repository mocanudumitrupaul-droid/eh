function listenToCloud() {
    if (!docRef) return;
    docRef.onSnapshot((doc) => {
        if (doc.exists()) {
            globalData = doc.data();
            if (!globalData.journalEntries) globalData.journalEntries = [];
            if (!globalData.skillsUnlocked) globalData.skillsUnlocked = { core: true };
            
            const curEl = document.getElementById("bs-current");
            const goEl = document.getElementById("bs-goal");
            if(curEl && document.activeElement !== curEl) curEl.value = globalData.bsCurrent || 0;
            if(goEl && document.activeElement !== goEl) goEl.value = globalData.bsGoal || 10000;
            
            calculateProgress();
            displayEntries();
            drawSkillTree();
            if (currentlySelectedNode) showSkillDetails(currentlySelectedNode);
        }
    }, (error) => {
        console.error("Eroare la citirea datelor live din Cloud:", error);
    });
}

function updateCloudData() {
    if (!docRef) return;
    const curEl = document.getElementById("bs-current");
    const goEl = document.getElementById("bs-goal");
    globalData.bsCurrent = curEl ? (parseFloat(curEl.value) || 0) : 0;
    globalData.bsGoal = goEl ? (parseFloat(goEl.value) || 10000) : 10000;
    
    docRef.set(globalData).catch(err => console.error("Cloud Error la salvare:", err));
    calculateProgress();
}

function drawSkillTree() {
    const nodesContainer = document.getElementById("nodes-layer");
    const svgCanvas = document.getElementById("tree-svg-canvas");
    if (!nodesContainer || !svgCanvas) return;

    nodesContainer.innerHTML = "";
    svgCanvas.innerHTML = "";

    const unlocked = globalData.skillsUnlocked || { core: true };
    const labels = translations[currentLang] || translations["ro"];

    skillTreeStructure.connections.forEach(conn => {
        const nodeFrom = skillTreeStructure.nodes[conn.from];
        const nodeTo = skillTreeStructure.nodes[conn.to];
        if (!nodeFrom || !nodeTo) return;

        const isLineActive = unlocked[conn.from] && unlocked[conn.to];
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", nodeFrom.x);
        line.setAttribute("y1", nodeFrom.y);
        line.setAttribute("x2", nodeTo.x);
        line.setAttribute("y2", nodeTo.y);
        line.setAttribute("class", `tree-line ${isLineActive ? 'unlocked' : 'locked'}`);
        svgCanvas.appendChild(line);
    });

    Object.keys(skillTreeStructure.nodes).forEach(key => {
        const nodeData = skillTreeStructure.nodes[key];
        const isUnlocked = !!unlocked[key];
        const nodeDiv = document.createElement("div");
        nodeDiv.className = `skill-node ${isUnlocked ? 'unlocked' : 'locked'}`;
        nodeDiv.style.left = `${nodeData.x}px`;
        nodeDiv.style.top = `${nodeData.y}px`;

        const translatedName = labels["node_" + key] || nodeData.name;
        const statusLabel = isUnlocked ? (labels.node_unlocked || "Unlocked") : (labels.node_locked || "Locked");

        nodeDiv.innerHTML = `
            <div class="rhombus-outer" onclick="selectSkillNode('${key}')">
                <div class="rhombus-inner">
                    <span class="node-icon">${nodeData.icon}</span>
                    <span>${translatedName.split(' ')[0]}</span>
                    <span class="node-status-text">${statusLabel}</span>
                </div>
            </div>
        `;
        nodesContainer.appendChild(nodeDiv);
    });

    applyPanZoomTransform();
}

function selectSkillNode(nodeId) {
    const nodeData = skillTreeStructure.nodes[nodeId];
    if (!nodeData) return;

    zoomScale = 1.3;
    const viewport = document.getElementById("tree-viewport-area");
    if (viewport) {
        const vWidth = viewport.clientWidth;
        const vHeight = viewport.clientHeight;
        panX = ((vWidth - 170) / 2) - (nodeData.x * zoomScale);
        panY = (vHeight / 2) - (nodeData.y * zoomScale);
    }

    applyPanZoomTransform();
    showSkillDetails(nodeId);
}

function toggleNodeFromMenu(nodeId) {

// 4. INTERFAȚĂ DINAMICĂ (ZOOM, PANNING, EFECTE PARTICULE ELECTRO)
// =========================================================================
function setupZoomPanEngine() {
    const viewport = document.getElementById("tree-viewport-area");
    if (!viewport) return;

    viewport.addEventListener("wheel", (e) => {
        e.preventDefault();
        const zoomFactor = 0.05;
        zoomScale = e.deltaY < 0 ? Math.min(zoomScale + zoomFactor, 2.0) : Math.max(zoomScale - zoomFactor, 0.4);
        applyPanZoomTransform();
    }, { passive: false });

    viewport.addEventListener("mousedown", (e) => {
        isDragging = true;
        startX = e.clientX - panX;
        startY = e.clientY - panY;
    });

    window.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        panX = e.clientX - startX;
        panY = e.clientY - startY;
        applyPanZoomTransform();
    });

    window.addEventListener("mouseup", () => { isDragging = false; });
    
    viewport.addEventListener("touchstart", (e) => {
        if (e.touches.length === 1) {
            isDragging = true;
            startX = e.touches[0].clientX - panX;
            startY = e.touches[0].clientY - panY;
        }
    });
    viewport.addEventListener("touchmove", (e) => {
        if (!isDragging || e.touches.length !== 1) return;
        panX = e.touches[0].clientX - startX;
        panY = e.touches[0].clientY - startY;
        applyPanZoomTransform();
    });
    viewport.addEventListener("touchend", () => { isDragging = false; });
}

function adjustZoom(amount) {
    zoomScale = Math.min(Math.max(zoomScale + amount, 0.4), 2.0);
    applyPanZoomTransform();
}

function resetZoomAndPan() {
    zoomScale = 0.85; panX = 80; panY = 20;
    applyPanZoomTransform();
}

function applyPanZoomTransform() {
    const canvas = document.getElementById("tree-canvas-board");
    if (canvas) canvas.style.transform = `translate(${panX}px, ${panY}px)
